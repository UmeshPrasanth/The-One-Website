<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Event Booking</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background-color: #f9fafc;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }
    .navbar {
      background-color: #0d6efd;
    }
    .navbar-brand {
      color: white !important;
      font-weight: 600;
    }
    .container {
      margin-top: 40px;
    }
    .section-title {
      margin: 30px 0 15px;
      color: #0d6efd;
      font-weight: 600;
      font-size: 1.4rem;
    }
    table {
      background-color: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    th {
      background-color: #0d6efd;
      color: white;
    }
    .footer {
      text-align: center;
      padding: 20px;
      background-color: #f1f1f1;
      margin-top: 40px;
      color: #666;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">🎟 Admin Dashboard</a>
    </div>
  </nav>

  <div class="container">
    <!-- ✅ EVENTS SECTION -->
    <h2 class="section-title">Available Events</h2>
    <table class="table table-striped" id="eventsTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Event Name</th>
          <th>Description</th>
          <th>Available Tickets</th>
          <th>Price (₹)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- ✅ BOOKINGS SECTION -->
    <h2 class="section-title">Bookings Management</h2>
    <table class="table table-striped" id="bookingsTable">
      <thead>
        <tr>
          <th>Booking ID</th>
          <th>Customer Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Event</th>
          <th>Tickets</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="footer">
    <p>© 2025 Event Booking System | Admin Panel</p>
  </div>

  <script>
    // ✅ Fetch and display events
    async function loadEvents() {
      try {
        const response = await fetch("http://localhost:8080/api/events");
        const events = await response.json();
        const tbody = document.querySelector("#eventsTable tbody");
        tbody.innerHTML = "";

        events.forEach(event => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${event.id}</td>
            <td>${event.name}</td>
            <td>${event.description}</td>
            <td>${event.availableTickets}</td>
            <td>${event.pricePerTicket}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        console.error("Error loading events:", err);
      }
    }

    // ✅ Fetch and display bookings
    async function loadBookings() {
      try {
        const response = await fetch("http://localhost:8080/api/bookings/all");
        const bookings = await response.json();
        const tbody = document.querySelector("#bookingsTable tbody");
        tbody.innerHTML = "";

        bookings.forEach(booking => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${booking.bookingId}</td>
            <td>${booking.name}</td>
            <td>${booking.email}</td>
            <td>${booking.phone}</td>
            <td>${booking.event ? booking.event.name : "—"}</td>
            <td>${booking.numTickets}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        console.error("Error loading bookings:", err);
      }
    }

    // Load data when page opens
    loadEvents();
    loadBookings();
  </script>
</body>
</html>
