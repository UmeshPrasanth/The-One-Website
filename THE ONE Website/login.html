<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login - The One</title>
  <link rel="stylesheet" href="Contacts.css" />
  <style>
    body { background: #111; color: #fff; font-family: 'Poppins', sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
    form { background:#222; padding:30px; border-radius:10px; width:300px; text-align:center; }
    input { display:block; margin:10px auto; width:90%; padding:10px; border-radius:5px; border:none; }
    button { padding:10px 20px; border:none; border-radius:5px; background:crimson; color:white; cursor:pointer; }
    button:hover { background:red; }
  </style>
</head>
<body>
  <form id="loginForm">
    <h2>Admin Login</h2>
    <input id="username" type="text" placeholder="Username" required />
    <input id="password" type="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch("http://localhost:8085/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (data.status === "success") {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "admin.html";
      } else {
        alert("❌ Invalid credentials!");
      }
    });
  </script>
</body>
</html>
